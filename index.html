<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتاب الأداء الراقي | دليلك للقمة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212; /* خلفية داكنة لتعطي شعوراً بالفخامة */
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e1e1e;
            margin: 20px auto;
            padding: 30px;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #d4af37; /* إطار ذهبي بسيط */
        }
        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h2 { color: #d4af37; } /* عنوان ذهبي */
        p { line-height: 1.6; color: #ccc; }
        .price {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: #fff;
        }
        .buy-button {
            display: inline-block;
            background: #d4af37;
            color: #000;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            width: 100%;
        }
        .buy-button:hover {
            background: #f1c40f;
            transform: scale(1.05);
        }
        .footer-note {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>الأداء الراقي 🏆</h2>
    
    <img src="book.jpg" alt="غلاف كتاب الأداء الراقي">

    <p>تعلم كيف تفوز بالمباراة قبل أن تبدأ. دليل الرياضيين للسيطرة الذهنية الكاملة وتحويل الضغط إلى طاقة.</p>

    <div class="price">السعر: 500 دج</div>

    <a href="https://pay.chargily.com/your-actual-link" class="buy-button">
        اشترِ الآن عبر الذهبية / CIB 💳
    </a>

    <p class="footer-note">تحصل على الكتاب مباشرة بصيغة PDF بعد الدفع</p>
</div>

</body>
</html>
