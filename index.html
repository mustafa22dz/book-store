<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتاب الأداء الراقي | دليلك للقمة</title>
    <style>
        /* التعديل الجوهري لتوسيط الخانة في منتصف الشاشة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex; /* تفعيل نظام المرونة */
            justify-content: center; /* التوسيط الأفقي */
            align-items: center; /* التوسيط العمودي */
            min-height: 100vh; /* جعل الـ body يأخذ كامل طول الشاشة */
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            width: 350px;
            max-width: 90%; /* لضمان التوافق مع الهواتف */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #d4af37;
            text-align: center; /* توسيط النصوص داخل الخانة */
            transition: transform 0.3s ease;
        }

        /* تأثير بسيط عند تمرير الماوس على الخانة */
        .container:hover {
            transform: translateY(-5px);
        }

        img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h2 { 
            color: #d4af37; 
            margin-top: 0;
            font-size: 26px;
        }

        p { 
            line-height: 1.6; 
            color: #ccc; 
            font-size: 15px;
        }

        .price-tag {
            background: rgba(212, 175, 55, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px dashed #d4af37;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        .buy-button {
            display: block;
            background: linear-gradient(45deg, #d4af37, #f1c40f); /* تدرج ذهبي جذاب */
            color: #000;
            padding: 18px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .buy-button:hover {
            background: linear-gradient(45deg, #f1c40f, #d4af37);
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        .footer-note {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* إضافة أيقونة بسيطة للتحميل */
        .footer-note::before {
            content: '⚡';
        }
    </style>
</head>
<body>

<div class="container">
    <h2>الأداء الراقي 🏆</h2>
    
    <img src="book.jpg" alt="غلاف كتاب الأداء الراقي">

    <p>حوّل عقلك إلى أقوى سلاح لديك. تعلم أسرار السيطرة الذهنية وبروتوكولات الأبطال قبل المباريات الكبرى.</p>

    <div class="price-tag">
        <span style="color: #d4af37; font-size: 14px;">السعر الحالي:</span><br>
        <span class="price">500 دج</span>
    </div>

    <a href="https://pay.chargily.com/your-actual-link" class="buy-button">
        شراء الكتاب الآن 💳
    </a>

    <p class="footer-note">تسليم فوري (PDF) بعد نجاح الدفع</p>
</div>

</body>
</html>
